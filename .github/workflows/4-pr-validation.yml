# ----------------------------------------------------------------------------------------------------
# 4 - PR Validation: Build + Test
# ----------------------------------------------------------------------------------------------------
name: 4 - PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'checklist-squad.sln'

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore checklist-squad.sln

      - name: Build solution
        run: dotnet build checklist-squad.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test checklist-squad.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: '**/test-results.trx'
          retention-days: 5

  validate-bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate Bicep syntax
        run: az bicep build --file infra/Bicep/main.bicep
