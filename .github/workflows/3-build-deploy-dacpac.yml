# ----------------------------------------------------------------------------------------------------
# 3 - Build and Deploy SQL DACPAC
# ----------------------------------------------------------------------------------------------------
name: 3 - Build & Deploy DACPAC

on:
  push:
    branches: [main]
    paths:
      - 'src/CheckList.Database/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  build-dacpac:
    name: Build DACPAC
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build DACPAC
        run: dotnet build src/CheckList.Database/CheckList.Database.sqlproj --configuration Release

      - name: Upload DACPAC artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dacpac-package
          path: src/CheckList.Database/bin/Release/
          retention-days: 5

  deploy-dacpac:
    name: Deploy DACPAC
    needs: build-dacpac
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download DACPAC artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dacpac-package
          path: ./dacpac-package

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy DACPAC to Azure SQL
        uses: azure/sql-action@bda1b4c4de0bb2e0f76916a2f58fb1d1b5ef64b4 # v2.3.0
        with:
          connection-string: ${{ secrets.SQL_CONNECTION_STRING }}
          path: ./dacpac-package/CheckList.Database.dacpac
          action: publish
