# ----------------------------------------------------------------------------------------------------
# Reusable workflow: Bicep infrastructure deployment
# ----------------------------------------------------------------------------------------------------
name: Template - Bicep Deploy

on:
  workflow_call:
    inputs:
      environmentName:
        required: true
        type: string
        description: 'Target environment (dev, qa, prod)'
      resourceGroupName:
        required: true
        type: string
        description: 'Azure Resource Group name'
      bicepPath:
        required: false
        type: string
        default: 'infra/Bicep/main.bicep'
      bicepParamPath:
        required: false
        type: string
        default: 'infra/Bicep/main.bicepparam'
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      APP_NAME:
        required: true
      ENVCODE:
        required: true
      RESOURCE_GROUP_LOCATION:
        required: true
      INSTANCE_NUMBER:
        required: true
      SQL_DATABASE_NAME:
        required: true
      SQLADMIN_LOGIN_USERID:
        required: true
      SQLADMIN_LOGIN_USERSID:
        required: true
      SQLADMIN_LOGIN_TENANTID:
        required: true
      KEYVAULT_OWNER_USERID:
        required: true

jobs:
  deploy-bicep:
    name: Deploy Bicep - ${{ inputs.environmentName }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environmentName }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Replace tokens in parameter file
        uses: cschleiden/replace-tokens@0cc44ed8a69a04a6768d2fc10005e2ce5a61e088 # v1.3
        with:
          files: '${{ inputs.bicepParamPath }}'
        env:
          APP_NAME: ${{ secrets.APP_NAME }}
          ENVCODE: ${{ secrets.ENVCODE }}
          RESOURCE_GROUP_LOCATION: ${{ secrets.RESOURCE_GROUP_LOCATION }}
          INSTANCE_NUMBER: ${{ secrets.INSTANCE_NUMBER }}
          SQL_DATABASE_NAME: ${{ secrets.SQL_DATABASE_NAME }}
          SQLADMIN_LOGIN_USERID: ${{ secrets.SQLADMIN_LOGIN_USERID }}
          SQLADMIN_LOGIN_USERSID: ${{ secrets.SQLADMIN_LOGIN_USERSID }}
          SQLADMIN_LOGIN_TENANTID: ${{ secrets.SQLADMIN_LOGIN_TENANTID }}
          KEYVAULT_OWNER_USERID: ${{ secrets.KEYVAULT_OWNER_USERID }}

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        uses: azure/arm-deploy@a1361c2c2cd2e944fee2fdb1fb5e9e4c5e1e1807 # v2.0.0
        with:
          resourceGroupName: ${{ inputs.resourceGroupName }}
          template: ${{ inputs.bicepPath }}
          parameters: ${{ inputs.bicepParamPath }}
          deploymentMode: Validate

      - name: Deploy Bicep
        uses: azure/arm-deploy@a1361c2c2cd2e944fee2fdb1fb5e9e4c5e1e1807 # v2.0.0
        with:
          resourceGroupName: ${{ inputs.resourceGroupName }}
          template: ${{ inputs.bicepPath }}
          parameters: ${{ inputs.bicepParamPath }}
          deploymentMode: Incremental
          failOnStdErr: false
