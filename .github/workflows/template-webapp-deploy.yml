# ------------------------------------------------------------------------------------------------------------------------
# GHA Reusable Called Workflow to deploy an already built WebApp
# ------------------------------------------------------------------------------------------------------------------------
# You need to set up secrets in the GitHub Secrets Repository before running these workflows.
#   See readme.md for details
# ------------------------------------------------------------------------------------------------------------------------
name: z_template_webapp_deploy
run-name: Deploy WebApp
on:
  workflow_call:
    inputs:
      envCode:
        required: true
        type: string
      appName:
        required: false
        type: string
        default: ''
      listFilesBeforeDeploy:
        required: false
        type: boolean
        default: true
  
# ------------------------------------------------------------------------------------------------------------------------
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.envCode }}

    env:
      artifactName: webapp

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4.1.7
      with:
        name: ${{ env.artifactName }}

    - name: List Files Before Deploy
      if: inputs.listFilesBeforeDeploy == true
      run: 
        tree ${{ github.action_path }}
      continue-on-error: true

    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Resolve WebApp name
      # Prefer explicit appName from infra outputs; fall back to legacy environment-based naming.
      id: resolve-app
      shell: bash
      env:
        INPUT_APP_NAME: ${{ inputs.appName }}
        INPUT_ENV_CODE: ${{ inputs.envCode }}
        VAR_APP_NAME: ${{ vars.APP_NAME }}
        VAR_INSTANCE_NUMBER: ${{ vars.INSTANCE_NUMBER }}
      run: |
        if [ -n "$INPUT_APP_NAME" ]; then
          echo "app_name=$INPUT_APP_NAME" >> "$GITHUB_OUTPUT"
        elif [ "$INPUT_ENV_CODE" = "prod" ]; then
          echo "app_name=$VAR_APP_NAME" >> "$GITHUB_OUTPUT"
        else
          echo "app_name=${VAR_APP_NAME}${VAR_INSTANCE_NUMBER}-${INPUT_ENV_CODE}" >> "$GITHUB_OUTPUT"
        fi

    - name: Deploy WebApp Zip
      uses: Azure/webapps-deploy@v2
      with:
        app-name: ${{ steps.resolve-app.outputs.app_name }}
        package: '.'

    - name: Logout and cleanup
      shell: bash
      run: |
        az logout
        az cache purge
        az account clear
