# ------------------------------------------------------------------------------------------------------------------------
# GHA Reusable Called Workflow to deploy an already built WebApp
# ------------------------------------------------------------------------------------------------------------------------
# You need to set up secrets in the GitHub Secrets Repository before running these workflows.
#   See readme.md for details
# ------------------------------------------------------------------------------------------------------------------------
name: z_template_webapp_deploy
run-name: Deploy WebApp
on:
  workflow_call:
    inputs:
      envCode:
        required: true
        type: string
      appName:
        required: false
        type: string
        default: ''
      listFilesBeforeDeploy:
        required: false
        type: boolean
        default: true
  
# ------------------------------------------------------------------------------------------------------------------------
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.envCode }}

    env:
      artifactName: webapp

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4.1.7
      with:
        name: ${{ env.artifactName }}

    - name: List Files Before Deploy
      if: inputs.listFilesBeforeDeploy == true
      run: 
        tree ${{ github.action_path }}
      continue-on-error: true

    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Resolve WebApp name
      # Prefer explicit appName from infra outputs; fall back to legacy environment-based naming.
      id: resolve-app
      shell: bash
      env:
        INPUT_APP_NAME: ${{ inputs.appName }}
        INPUT_ENV_CODE: ${{ inputs.envCode }}
        VAR_APP_NAME: ${{ vars.APP_NAME }}
        VAR_INSTANCE_NUMBER: ${{ vars.INSTANCE_NUMBER }}
      run: |
        # Priority: 1) explicit appName from infra outputs, 2) prod APP_NAME, 3) non-prod APP_NAME+INSTANCE_NUMBER-envCode
        if [ -n "$INPUT_APP_NAME" ]; then
          resolved_app_name="$INPUT_APP_NAME"
        elif [ "$INPUT_ENV_CODE" = "prod" ]; then
          if [ -z "$VAR_APP_NAME" ]; then
            echo "Error: APP_NAME must be set when appName input is not provided."
            exit 1
          fi
          resolved_app_name="$VAR_APP_NAME"
        else
          if [ -z "$VAR_APP_NAME" ] || [ -z "$VAR_INSTANCE_NUMBER" ] || [ -z "$INPUT_ENV_CODE" ]; then
            echo "Error: APP_NAME, INSTANCE_NUMBER, and envCode are required to construct non-prod Web App name."
            exit 1
          fi
          resolved_app_name="${VAR_APP_NAME}${VAR_INSTANCE_NUMBER}-${INPUT_ENV_CODE}"
        fi

        # Azure Web App naming: 2-60 chars, lowercase alphanumeric/hyphen, cannot start/end with hyphen.
        name_length=${#resolved_app_name}
        if [ "$name_length" -lt 2 ] || [ "$name_length" -gt 60 ]; then
          echo "Error: Web App name must be 2-60 characters. Got: $resolved_app_name"
          exit 1
        fi

        if ! [[ "$resolved_app_name" =~ ^[a-z0-9-]+$ ]]; then
          echo "Error: Web App name must contain only lowercase alphanumeric characters or hyphens. Got: $resolved_app_name"
          exit 1
        fi

        if [[ "$resolved_app_name" == -* ]] || [[ "$resolved_app_name" == *- ]]; then
          echo "Error: Web App name cannot start or end with a hyphen. Got: $resolved_app_name"
          exit 1
        fi

        printf 'app_name=%s\n' "$resolved_app_name" >> "$GITHUB_OUTPUT"

    - name: Deploy WebApp Zip
      uses: Azure/webapps-deploy@v2
      with:
        app-name: ${{ steps.resolve-app.outputs.app_name }}
        package: '.'

    - name: Logout and cleanup
      shell: bash
      run: |
        az logout
        az cache purge
        az account clear
