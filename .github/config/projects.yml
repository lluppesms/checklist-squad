# ------------------------------------------------------------------------------------------------------------------------
# Project Configuration for GitHub Actions
# These values are used across multiple workflows to keep paths consistent
# ------------------------------------------------------------------------------------------------------------------------
# Usage in calling workflow:
#   jobs:
#     load-config:
#       uses: ./.github/workflows/template-load-config.yml
#     build:
#       needs: load-config
#       uses: ./.github/workflows/template-webapp-build.yml
#       with:
#         rootDirectory: ${{ needs.load-config.outputs.web_rootDirectory }}
#         projectName: ${{ needs.load-config.outputs.web_projectName }}
# ------------------------------------------------------------------------------------------------------------------------

projects:
  # Web Application (Blazor)
  web:
    shortName: 'web'
    rootDirectory: 'src/CheckList.Web'
    projectName: 'CheckList.Web'
    testDirectory: 'src/CheckList.Tests'
    testProjectName: 'CheckList.Tests'
    playwrightDirectory: 'src/CheckList.PlaywrightTests'
    playwrightProjectName: 'CheckList.PlaywrightTests'

  # SQL Database Project
  sql:
    shortName: 'sql'
    rootDirectory: 'src/CheckList.Database'
    projectName: 'CheckList.Database'
    solutionName: 'CheckList.Database'
    testDirectory: ''
    testProjectName: ''
    playwrightDirectory: ''
    playwrightProjectName: ''
