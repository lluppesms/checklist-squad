<div class="loading" *ngIf="!selectedAction">Loading&#8230;</div>
<h2 *ngIf="selectedAction">
  <a (click)="returnToList()"><i class="fas fa-arrow-circle-left"></i></a>
  Edit Action <span > {{ selectedAction?.actionId }}</span>
</h2>

<div class="card">
  <div class="card-body">
    <form [formGroup]="editForm" novalidate>
      <div class="form-group">
        <label class="col-md-4">Category:</label>
        <input type="text" class="form-control" formControlName="categoryText" #categoryText />
      </div>
      <div *ngIf="editForm.controls['categoryText'].invalid && (editForm.controls['categoryText'].dirty || editForm.controls['categoryText'].touched)" class="alert alert-danger">
        <div *ngIf="editForm.controls['categoryText'].errors.required">Category Name is required.</div>
      </div>
      <div class="form-group">
        <label class="col-md-4">Action:</label>
        <input type="text" class="form-control" autofocus formControlName="actionText" #actionText />
      </div>
      <div *ngIf="editForm.controls['actionText'].invalid && (editForm.controls['actionText'].dirty || editForm.controls['actionText'].touched)" class="alert alert-danger">
        <div *ngIf="editForm.controls['actionText'].errors.required">Action is required.</div>
      </div>
      <div class="form-group">
        <button (click)="editAction()" [disabled]="editForm.pristine || editForm.invalid" class="btn btn-primary" accesskey="s"><u>S</u>ave</button>
        <button (click)="returnToList()" class="btn btn-default" style="margin-left: 5px;">Cancel</button>
      </div>
    </form>
  </div>
</div>
