# ----------------------------------------------------------------------------------------------------
# Deploy Bicep Infrastructure
# ----------------------------------------------------------------------------------------------------
trigger: none

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - prod

variables:
  - group: checklist-common
  - group: checklist-${{ parameters.environment }}
  - name: resourceGroupName
    value: 'rg-checklist-${{ parameters.environment }}'

stages:
  - stage: ValidateBicep
    displayName: 'Validate Bicep'
    jobs:
      - job: Validate
        displayName: 'Validate Bicep Templates'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 10
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Validate Bicep syntax'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az bicep build --file infra/Bicep/main.bicep

  - stage: DeployInfra
    displayName: 'Deploy Infrastructure'
    dependsOn: ValidateBicep
    condition: succeeded()
    jobs:
      - deployment: DeployBicep
        displayName: 'Deploy Bicep - ${{ parameters.environment }}'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        environment: '${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/bicep-deploy.yml
                  parameters:
                    environmentName: '${{ parameters.environment }}'
                    resourceGroupName: '$(resourceGroupName)'
                    serviceConnection: '$(serviceConnection)'
