# ----------------------------------------------------------------------------------------------------
# Build and Deploy SQL DACPAC
# ----------------------------------------------------------------------------------------------------
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/CheckList.Database/**

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - prod

variables:
  - group: checklist-common
  - group: checklist-${{ parameters.environment }}
  - name: dacpacProject
    value: 'src/CheckList.Database/CheckList.Database.sqlproj'

stages:
  - stage: Build
    displayName: 'Build DACPAC'
    jobs:
      - job: BuildDacpac
        displayName: 'Build DACPAC'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 10
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Setup .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '10.0.x'

          - task: DotNetCoreCLI@2
            displayName: 'Build DACPAC project'
            inputs:
              command: 'build'
              projects: '$(dacpacProject)'
              arguments: '--configuration Release'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish DACPAC artifact'
            inputs:
              PathtoPublish: 'src/CheckList.Database/bin/Release/'
              ArtifactName: 'dacpac-package'

  - stage: Deploy
    displayName: 'Deploy DACPAC'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployDacpac
        displayName: 'Deploy DACPAC - ${{ parameters.environment }}'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 15
        environment: '${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  displayName: 'Download DACPAC artifact'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'dacpac-package'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: SqlAzureDacpacDeployment@1
                  displayName: 'Deploy DACPAC to Azure SQL'
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    AuthenticationType: 'connectionString'
                    ConnectionString: '$(sqlConnectionString)'
                    deployType: 'DacpacTask'
                    DeploymentAction: 'Publish'
                    DacpacFile: '$(System.ArtifactsDirectory)/dacpac-package/CheckList.Database.dacpac'
