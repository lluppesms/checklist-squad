# ----------------------------------------------------------------------------------------------------
# Build and Deploy Application (API + Web)
# ----------------------------------------------------------------------------------------------------
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/CheckList.Api/**
      - src/CheckList.Web/**
      - src/CheckList.ServiceDefaults/**
      - checklist-squad.sln

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - prod

variables:
  - group: checklist-common
  - group: checklist-${{ parameters.environment }}
  - name: solutionFile
    value: 'checklist-squad.sln'

stages:
  - stage: Build
    displayName: 'Build Application'
    jobs:
      - job: BuildApp
        displayName: 'Build & Publish'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 15
        steps:
          - checkout: self

          - template: templates/dotnet-build.yml
            parameters:
              dotnetVersion: '10.0.x'
              solutionFile: '$(solutionFile)'
              publishApi: true
              publishWeb: true

  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployApp
        displayName: 'Deploy App - ${{ parameters.environment }}'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 15
        environment: '${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  displayName: 'Download Web artifact'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'web-package'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    appType: 'webAppLinux'
                    appName: '$(webAppName)'
                    package: '$(System.ArtifactsDirectory)/web-package/**/*.zip'
