# ----------------------------------------------------------------------------------------------------
# PR Validation: Build + Test
# ----------------------------------------------------------------------------------------------------
trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - checklist-squad.sln

variables:
  - name: solutionFile
    value: 'checklist-squad.sln'

stages:
  - stage: Validate
    displayName: 'PR Validation'
    jobs:
      - job: BuildAndTest
        displayName: 'Build & Test'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 15
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Setup .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '10.0.x'

          - task: DotNetCoreCLI@2
            displayName: 'Restore dependencies'
            inputs:
              command: 'restore'
              projects: '$(solutionFile)'

          - task: DotNetCoreCLI@2
            displayName: 'Build solution'
            inputs:
              command: 'build'
              projects: '$(solutionFile)'
              arguments: '--configuration Release --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run tests'
            inputs:
              command: 'test'
              projects: '$(solutionFile)'
              arguments: '--configuration Release --no-build --verbosity normal'
              publishTestResults: true

      - job: ValidateBicep
        displayName: 'Validate Bicep'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 5
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Validate Bicep syntax'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az bicep build --file infra/Bicep/main.bicep
