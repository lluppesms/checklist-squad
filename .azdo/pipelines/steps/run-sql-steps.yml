# ------------------------------------------------------------------------------------------------------------------------
# Pipeline Steps Template -- steps to run a SQL script against an Azure SQL Database
# ------------------------------------------------------------------------------------------------------------------------
parameters:
  - name: serviceConnectionName
    default: ''
  - name: loginAccountType
    default: ''
  - name: runInDatabase
    default: ''
  - name: sqlFullFileName
    default: ''
  - name: fqdnServerName
    default: ''
  - name: logFullFileName
    default: ''
  - name: sqlAdminUser
    default: ''
  - name: sqlAdminPassword
    default: ''
  - name: sqlCmdVariables
    type: object
    default: []
  - name: addFirewallRule
    type: boolean
    default: true

# ------------------------------------------------------------------------------------------------------------------------
steps:
  # Temporarily add the agent's public IP to the SQL Server firewall
  - ${{ if eq(parameters.addFirewallRule, true) }}:
    - task: AzureCLI@2
      displayName: 'Add Agent IP to SQL Firewall'
      name: addFirewall
      inputs:
        azureSubscription: ${{ parameters.serviceConnectionName }}
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $agentIp = (Invoke-RestMethod -Uri "https://api.ipify.org" -TimeoutSec 10).Trim()
          Write-Host "Agent public IP: $agentIp"
          Write-Host "##vso[task.setvariable variable=agentPublicIp]$agentIp"
          $serverName = "${{ parameters.fqdnServerName }}" -replace '\.database\.windows\.net$', ''
          Write-Host "Adding temporary firewall rule to server $serverName in $(resourceGroupName)..."
          az sql server firewall-rule create `
            --resource-group "$(resourceGroupName)" `
            --server "$serverName" `
            --name "azdo-agent-temp-$(Build.BuildId)-sql" `
            --start-ip-address $agentIp `
            --end-ip-address $agentIp
          Write-Host "Firewall rule added successfully."
  # ------------------------------------------------------------------------------------------------------------------------
  # Run SQL Script with Local SQL User/Password (using Invoke-Sqlcmd)
  # ------------------------------------------------------------------------------------------------------------------------
  - ${{ if eq(lower(parameters.loginAccountType), 'local_sql') }}:
    - task: PowerShell@2
      displayName: Run SQL Script - Local SQL User
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Running SQL script: ${{ parameters.sqlFullFileName }} on ${{ parameters.fqdnServerName }} / ${{ parameters.runInDatabase }}"

          # Install SqlServer module if not present
          if (-not (Get-Module -ListAvailable -Name SqlServer)) {
            Install-Module -Name SqlServer -Force -AllowClobber -Scope CurrentUser
          }
          Import-Module SqlServer

          $sqlParams = @{
            ServerInstance = "${{ parameters.fqdnServerName }}"
            Database       = "${{ parameters.runInDatabase }}"
            Username       = "${{ parameters.sqlAdminUser }}"
            Password       = "${{ parameters.sqlAdminPassword }}"
            InputFile      = "${{ parameters.sqlFullFileName }}"
            Verbose        = $true
          }

          # Add SQLCMD variables if provided
          $varArray = @()
          ${{ each var in parameters.sqlCmdVariables }}:
          $varArray += "${{ var }}"
          ${{ end }}
          if ($varArray.Count -gt 0) {
            $sqlParams.Variable = $varArray
          }

          Invoke-Sqlcmd @sqlParams | Out-File -FilePath "${{ parameters.logFullFileName }}"
        errorActionPreference: 'continue'
      continueOnError: true

  # ------------------------------------------------------------------------------------------------------------------------
  # Run SQL Script with Service Principal Access Token (using Invoke-Sqlcmd)
  #   See: https://learn.microsoft.com/en-us/powershell/module/sqlserver/invoke-sqlcmd?view=sqlserver-ps
  # ------------------------------------------------------------------------------------------------------------------------
  - ${{ if eq(lower(parameters.loginAccountType), 'svc_principal') }}:
    - task: AzureCLI@2
      displayName: Run SQL Script - Service Principal
      inputs:
        azureSubscription: ${{ parameters.serviceConnectionName }}
        scriptType: pscore
        scriptLocation: inlineScript
        inlineScript: |
          Write-Host "Running SQL script: ${{ parameters.sqlFullFileName }} on ${{ parameters.fqdnServerName }} / ${{ parameters.runInDatabase }}"

          # Get access token for Azure SQL
          $accessToken = az account get-access-token --resource=https://database.windows.net/ --query accessToken -o tsv

          # Install SqlServer module if not present
          if (-not (Get-Module -ListAvailable -Name SqlServer)) {
            Install-Module -Name SqlServer -Force -AllowClobber -Scope CurrentUser
          }
          Import-Module SqlServer

          $sqlParams = @{
            ServerInstance = "${{ parameters.fqdnServerName }}"
            Database       = "${{ parameters.runInDatabase }}"
            AccessToken    = $accessToken
            InputFile      = "${{ parameters.sqlFullFileName }}"
            Verbose        = $true
          }

          # Add SQLCMD variables if provided
          $varArray = @()
          ${{ each var in parameters.sqlCmdVariables }}:
          $varArray += "${{ var }}"
          ${{ end }}
          if ($varArray.Count -gt 0) {
            $sqlParams.Variable = $varArray
          }

          Invoke-Sqlcmd @sqlParams | Out-File -FilePath "${{ parameters.logFullFileName }}"
        errorActionPreference: 'continue'
      continueOnError: true

  # Always remove the temporary firewall rule
  - ${{ if eq(parameters.addFirewallRule, true) }}:
    - task: AzureCLI@2
      displayName: 'Remove Agent IP from SQL Firewall'
      condition: always()
      inputs:
        azureSubscription: ${{ parameters.serviceConnectionName }}
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $serverName = "${{ parameters.fqdnServerName }}" -replace '\.database\.windows\.net$', ''
          Write-Host "Removing temporary firewall rule from server $serverName..."
          az sql server firewall-rule delete `
            --resource-group "$(resourceGroupName)" `
            --server "$serverName" `
            --name "azdo-agent-temp-$(Build.BuildId)-sql"
          Write-Host "Firewall rule removed successfully."
