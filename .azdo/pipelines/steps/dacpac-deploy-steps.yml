# ------------------------------------------------------------------------------------------------------------------------
# Pipeline Steps Template -- steps to build and deploy SQL DACPAC
# ------------------------------------------------------------------------------------------------------------------------
parameters:
  - name: serviceConnectionName
    default: ''
  - name: loginAccountType
    default: 'svc_principal'
  - name: artifactName
    default: ''
  - name: appProjectName
    default: ''
  - name: fqdnServerName
    default: ''
  - name: sqlDatabaseName
    default: ''
  - name: sqlAdminUser
    default: ''
  - name: sqlAdminPassword
    default: ''
  - name: addFirewallRule
    type: boolean
    default: true

# ------------------------------------------------------------------------------------------------------------------------
steps:
  - task: DownloadBuildArtifacts@0
    displayName: 'Download Build Artifacts'
    inputs:
      buildType: 'current'
      downloadType: 'single'
      artifactName: '${{ parameters.artifactName }}'
      downloadPath: '$(System.ArtifactsDirectory)'

  # Temporarily add the agent's public IP to the SQL Server firewall
  - ${{ if eq(parameters.addFirewallRule, true) }}:
    - task: AzureCLI@2
      displayName: 'Add Agent IP to SQL Firewall'
      name: addFirewall
      inputs:
        azureSubscription: ${{ parameters.serviceConnectionName }}
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $agentIp = (Invoke-RestMethod -Uri "https://api.ipify.org" -TimeoutSec 10).Trim()
          Write-Host "Agent public IP: $agentIp"
          Write-Host "##vso[task.setvariable variable=agentPublicIp]$agentIp"
          $serverName = "${{ parameters.fqdnServerName }}" -replace '\.database\.windows\.net$', ''
          Write-Host "Adding temporary firewall rule to server $serverName in $(resourceGroupName)..."
          az sql server firewall-rule create `
            --resource-group "$(resourceGroupName)" `
            --server "$serverName" `
            --name "azdo-agent-temp-$(Build.BuildId)" `
            --start-ip-address $agentIp `
            --end-ip-address $agentIp
          Write-Host "Firewall rule added successfully."

  # this "servicePrincipal" login type logs in using some identity magic
  - ${{ if eq(lower(parameters.loginAccountType), 'svc_principal') }}:
    - task: SqlAzureDacpacDeployment@1
      displayName: Deploy DACPAC - SvcPrin
      inputs:
        azureSubscription: ${{ parameters.serviceConnectionName }}
        ServerName: ${{ parameters.fqdnServerName }}
        DatabaseName: ${{ parameters.sqlDatabaseName }}
        DacpacFile: '$(System.ArtifactsDirectory)\${{ parameters.artifactName }}\${{ parameters.appProjectName }}.dacpac'
        AuthenticationType: 'servicePrincipal'
        DeleteFirewallRule: false
      continueOnError: true

  # this "server" login type logs in as a local sql user with a name and password
  - ${{ if eq(lower(parameters.loginAccountType), 'local_sql') }}:
    - task: SqlAzureDacpacDeployment@1
      displayName: Deploy DACPAC - Local User
      inputs:
        azureSubscription: ${{ parameters.serviceConnectionName }}
        ServerName: ${{ parameters.fqdnServerName }}
        DatabaseName: ${{ parameters.sqlDatabaseName }}
        DacpacFile: '$(System.ArtifactsDirectory)\${{ parameters.artifactName }}\${{ parameters.appProjectName }}.dacpac'
        AuthenticationType: 'server'
        SqlUsername: '${{ parameters.sqlAdminUser }}'
        SqlPassword: '${{ parameters.sqlAdminPassword }}'
        DeleteFirewallRule: false
      continueOnError: true

  # Always remove the temporary firewall rule
  - ${{ if eq(parameters.addFirewallRule, true) }}:
    - task: AzureCLI@2
      displayName: 'Remove Agent IP from SQL Firewall'
      condition: always()
      inputs:
        azureSubscription: ${{ parameters.serviceConnectionName }}
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $serverName = "${{ parameters.fqdnServerName }}" -replace '\.database\.windows\.net$', ''
          Write-Host "Removing temporary firewall rule from server $serverName..."
          az sql server firewall-rule delete `
            --resource-group "$(resourceGroupName)" `
            --server "$serverName" `
            --name "azdo-agent-temp-$(Build.BuildId)" `
            --yes
          Write-Host "Firewall rule removed successfully."

  # ------------------------------------------------------------------------------------------------------------------------
  # Additional References:
  # ------------------------------------------------------------------------------------------------------------------------
  # Logins: (try this to get a token for the service principal)
  #  https://erikej.github.io/sqlserver/2021/02/01/azure-sql-advanced-deployment-part4.html
  #
