# ------------------------------------------------------------------------------------------------------------------------
# Pipeline to run one sql file against a database
# See readme file for info about variable group "CheckList.Demo"
# ------------------------------------------------------------------------------------------------------------------------
name: $(date:yyyy).$(date:MM).$(date:dd)$(rev:.r) ${{ parameters.deployToEnvironment }}
pool:
  vmImage: windows-latest # dacpac restore only runs on Windows...

# ----------------------------------------------------------------------------------------------------
trigger:
  # since this repo has both AzDO and GHA pipelines, nothing is run automatically...
  - none

# ----------------------------------------------------------------------------------------------------
parameters:
  - name: deployToEnvironment
    displayName: Deploy To
    type: string
    values:
      - DEV
      - QA
      - PROD
      - DEV-QA-PROD
    default: DEV
  - name: loginAccountType
    displayName: Login Type
    type: string
    values:
      - SVC_PRINCIPAL
      - LOCAL_SQL
    default: SVC_PRINCIPAL
  - name: scriptName
    displayName: Action
    type: string
    default: 'Add-App-User-Rights.sql'
    values:
      - 'Add-App-User-Rights.sql'

# ----------------------------------------------------------------------------------------------------
variables:
  - group: CheckList.Demo
  - template: vars/var-common.yml
  - template: vars/var-service-connections.yml

# ----------------------------------------------------------------------------------------------------
stages:
- ${{ if ne(parameters.deployToEnvironment, 'DEV-QA-PROD') }}:
  - template: stages/run-sql-stages.yml
    parameters:
      environments: ['DEV']
      sqlFolderName: 'src\CheckList.Database\Patch\'
      sqlFileName: ${{ parameters.scriptName }}
      runInDatabase: $(SQL_DATABASE_NAME)
      loginAccountType: ${{ parameters.loginAccountType }}
      sqlCmdVariables:
        - 'AppIdentityName=$(APP_NAME)$(INSTANCE_NUMBER)-${{ lower(parameters.deployToEnvironment) }}'

- ${{ if eq(parameters.deployToEnvironment, 'DEV-QA-PROD') }}:
  - template: stages/run-sql-stages.yml
    parameters:
      environments: ['DEV','QA','PROD']
      sqlFolderName: 'src\CheckList.Database\Patch\'
      sqlFileName: ${{ parameters.scriptName }}
      runInDatabase: $(SQL_DATABASE_NAME)
      loginAccountType: ${{ parameters.loginAccountType }}
      sqlCmdVariables:
        - 'AppIdentityName=$(APP_NAME)$(INSTANCE_NUMBER)-${{ lower(parameters.deployToEnvironment) }}'
