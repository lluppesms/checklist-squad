# ------------------------------------------------------------------------------------------------------------------------
# Pipeline to deploy Bicep Infrastructure
# ------------------------------------------------------------------------------------------------------------------------
# See readme file for info about the contents of the variable group
# ------------------------------------------------------------------------------------------------------------------------
name: $(date:yyyy).$(date:MM).$(date:dd)$(rev:.r) ${{ parameters.deployToEnvironment }}

trigger: none
# trigger:
#   branches:
#     include:
#       - main
#   paths:
#     include:
#       - infra/Bicep/**

# ----------------------------------------------------------------------------------------------------
parameters:
  - name: deployToEnvironment
    displayName: Deploy To
    type: string
    default: 'DEV'
    values:
      - DEV
      - QA
      - PROD

# ----------------------------------------------------------------------------------------------------
variables:
  - group: checklist-common
  - group: checklist-${{ parameters.deployToEnvironment }}
  - template: vars/var-common.yml
  - name: resourceGroupName
    value: 'rg-checklist-${{ parameters.deployToEnvironment }}'

# ----------------------------------------------------------------------------------------------------
stages:
  - stage: ValidateBicep
    displayName: 'Validate Bicep'
    jobs:
      - job: Validate
        displayName: 'Validate Bicep Templates'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 10
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Validate Bicep syntax'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az bicep build --file $(bicepPath)

  # ----------------------------------------------------------------------------------------------------
  - stage: DeployInfra
    displayName: 'Deploy Infrastructure'
    dependsOn: ValidateBicep
    condition: succeeded()
    jobs:
      - deployment: DeployBicep
        displayName: 'Deploy Bicep - ${{ parameters.deployToEnvironment }}'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        environment: '${{ parameters.deployToEnvironment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: steps/bicep-deploy-steps.yml
                  parameters:
                    environmentName: '${{ parameters.deployToEnvironment }}'
                    resourceGroupName: '$(resourceGroupName)'
                    serviceConnection: '$(serviceConnection)'
